version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: tjjud_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./src:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    networks:
      - tjjud_net
    depends_on:
      db:
        condition: service_healthy

  webserver:
    image: httpd:2.4-alpine
    container_name: tjjud_apache
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html
      - ./docker/apache/httpd.conf:/usr/local/apache2/conf/httpd.conf
      - ./docker/apache/vhost.conf:/usr/local/apache2/conf/extra/vhost.conf
    networks:
      - tjjud_net
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: tjjud_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: tjjud_livros
      MYSQL_USER: tjjud_user
      MYSQL_PASSWORD: tjjud_pass
      MYSQL_ROOT_PASSWORD: root_pass
    ports:
      - "3307:3306"
    volumes:
      - tjjud_mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - tjjud_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-utjjud_user", "-ptjjud_pass"]
      interval: 10s
      timeout: 5s
      retries: 5

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: tjjud_phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: db
      PMA_USER: tjjud_user
      PMA_PASSWORD: tjjud_pass
    ports:
      - "8081:80"
    networks:
      - tjjud_net
    depends_on:
      - db

networks:
  tjjud_net:
    driver: bridge

volumes:
  tjjud_mysql_data:
